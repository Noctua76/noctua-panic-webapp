<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aegis Link Patrol V1</title>

<style>
:root{
  --bg:#03040a;
  --bg-soft:#0c0f18;
  --card:#11141f;
  --accent:#ff4b4b;
  --accent-soft:#ff8b6a;
  --text:#f5f5fa;
  --muted:#8e93a8;
  --border:#262a36;
  --radius:22px;
  --max-width:460px;
  --success:#22c55e;
  --error:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  min-height:100%;
  background:radial-gradient(circle at top,#202642 0,#03040a 55%);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{display:flex;justify-content:center;}

.app{
  width:100%;
  max-width:var(--max-width);
  min-height:100vh;
  padding:18px 14px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.patrol-card{
  margin-top:20px;
  border-radius:28px;
  background:
    radial-gradient(circle at 0 0,rgba(255,255,255,.05),transparent 55%),
    linear-gradient(145deg,#080914,#131627);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 28px 60px rgba(0,0,0,.9);
  padding:26px 20px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.patrol-header{text-align:center;display:flex;flex-direction:column;gap:6px;}

.version-pill{
  align-self:center;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  background:rgba(59,130,246,.14);
  border:1px solid rgba(96,165,250,.45);
  color:#bfdbfe;
}

.patrol-title{font-size:24px;letter-spacing:.08em;}

.patrol-subtitle{
  font-size:13px;
  color:var(--muted);
  line-height:1.45;
}

.patrol-status{
  border-radius:20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.status-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  font-size:13px;
  color:var(--muted);
}

.status-row strong{
  color:var(--text);
  text-align:right;
}

.scan-box{
  border-radius:24px;
  background:rgba(255,255,255,.03);
  border:1px dashed rgba(255,255,255,.18);
  padding:26px 18px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.scan-icon{font-size:42px;}

.scan-title{
  font-size:18px;
  font-weight:800;
  letter-spacing:.06em;
}

.scan-text{
  font-size:13px;
  color:var(--muted);
  line-height:1.45;
}

.scan-btn{
  margin-top:8px;
  width:100%;
  padding:13px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  background:linear-gradient(145deg,#2563eb,#60a5fa);
  color:white;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  box-shadow:0 0 18px rgba(37,99,235,.55);
}

.scan-btn:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.result-box{
  display:none;
  border-radius:18px;
  padding:14px;
  font-size:13px;
  line-height:1.5;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
}

.result-box.success{
  display:block;
  border-color:rgba(34,197,94,.45);
  color:#bbf7d0;
}

.result-box.error{
  display:block;
  border-color:rgba(239,68,68,.45);
  color:#fecaca;
}

.back-btn{
  display:block;
  text-align:center;
  padding:12px 16px;
  border-radius:999px;
  text-decoration:none;
  border:1px solid rgba(255,255,255,.14);
  color:var(--muted);
  background:rgba(255,255,255,.03);
  font-size:13px;
  font-weight:700;
}

.footer{
  margin-top:auto;
  text-align:center;
  font-size:11px;
  color:var(--muted);
}

#qr-reader{
  display:none;
  width:100%;
  overflow:hidden;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  background:#000;
}

#qr-reader video{
  border-radius:18px;
}

</style>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="app">

  <section class="patrol-card">

    <div class="patrol-header">
      <div class="version-pill">QR PATROL V.1</div>
      <h1 class="patrol-title">📷 QR Patrol</h1>
      <p class="patrol-subtitle">
        Scan assigned checkpoints during patrol rounds.
      </p>
    </div>

    <div class="patrol-status">
      <div class="status-row">
        <span>Module Status</span>
        <strong id="moduleStatus">Ready</strong>
      </div>
      <div class="status-row">
        <span>Mode</span>
        <strong>Checkpoint Scan</strong>
      </div>
      <div class="status-row">
        <span>GPS Evidence</span>
        <strong id="gpsStatus">Required</strong>
      </div>
    </div>

    <div class="scan-box">
      <div class="scan-icon">▦</div>
      <div class="scan-title">Scan Patrol Checkpoint</div>
      <p class="scan-text" id="scanText">
        Press the button below to record this patrol checkpoint.
      </p>

      <button class="scan-btn" type="button" id="scanBtn">
  Start Scanner
</button>

<div id="qr-reader"></div>

<div id="resultBox" class="result-box"></div>
    </div>

    <a href="index.html" class="back-btn">
      ← Back to Alert System
    </a>

  </section>

  <footer class="footer">
    © Noctua Core – Aegis Link Patrol Module
  </footer>

</div>

<script>
const API_BASE_URL = "https://noctua-panic-backend-production.up.railway.app";
function getActiveGuardSession() {
  const session =
    localStorage.getItem("aegis_guard_session") ||
    localStorage.getItem("guard_session") ||
    localStorage.getItem("aegis-current-guard") ||
    localStorage.getItem("aegis-guard-session");

  return session;
}

function enforceGuardSession() {
  const activeSession = getActiveGuardSession();

  if (!activeSession) {
    window.location.replace("index.html");
  }
}

enforceGuardSession();

window.addEventListener("pageshow", () => {
  enforceGuardSession();
});

const scanBtn = document.getElementById("scanBtn");
const resultBox = document.getElementById("resultBox");
const moduleStatus = document.getElementById("moduleStatus");
const gpsStatus = document.getElementById("gpsStatus");
const scanText = document.getElementById("scanText");
const qrReaderElement = document.getElementById("qr-reader");

let html5QrCode = null;
let isProcessing = false;

moduleStatus.textContent = "Ready";
gpsStatus.textContent = "Required";
scanText.textContent = "Press Start Scanner to scan a patrol checkpoint QR.";

function showResult(type, html) {
  resultBox.className = `result-box ${type}`;
  resultBox.innerHTML = html;
}

function extractToken(decodedText) {
  if (!decodedText) return null;

  const cleanText = decodedText.trim();

  if (cleanText.startsWith("PATROL:")) {
    return cleanText.replace("PATROL:", "").trim();
  }

  try {
    const url = new URL(cleanText);
    const tokenFromUrl = url.searchParams.get("token");
    if (tokenFromUrl) return tokenFromUrl.trim();
  } catch (err) {
    // Not a URL. Continue.
  }

  return cleanText;
}

function getCurrentPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error("GPS is not supported on this device."));
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        resolve({
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          accuracy: position.coords.accuracy,
        });
      },
      (error) => {
        reject(new Error(error.message || "GPS permission was denied."));
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0,
      }
    );
  });
}

async function stopScanner() {
  try {
    if (html5QrCode) {
      await html5QrCode.stop();
      await html5QrCode.clear();
    }
  } catch (err) {
    console.warn("Scanner stop warning:", err);
  }

  qrReaderElement.style.display = "none";
}

async function recordPatrol(token) {
  if (!token) {
    throw new Error("Invalid patrol QR. Token is missing.");
  }

  moduleStatus.textContent = "GPS";
  gpsStatus.textContent = "Locating...";
  scanBtn.textContent = "Recording...";
  scanBtn.disabled = true;

  const location = await getCurrentPosition();

  gpsStatus.textContent = `${Math.round(location.accuracy)}m`;
  moduleStatus.textContent = "Recording";

  const response = await fetch(`${API_BASE_URL}/patrol/scan`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      token,
      latitude: location.latitude,
      longitude: location.longitude,
      accuracy: location.accuracy,
    }),
  });

  const data = await response.json();

  if (!response.ok || data.status !== "ok") {
    throw new Error(data.message || "Patrol scan failed.");
  }

  moduleStatus.textContent = "Recorded";
  scanBtn.textContent = "Patrol Recorded";

  const recordedAt = data.patrol?.patrol_time
    ? new Date(data.patrol.patrol_time).toLocaleString("el-GR")
    : new Date().toLocaleString("el-GR");

  showResult(
    "success",
    `
    <strong>Patrol Recorded Successfully</strong><br>
    Checkpoint: ${data.point?.name || "-"}<br>
    Site: ${data.point?.site_name || "-"}<br>
    Time: ${recordedAt}<br>
    GPS Accuracy: ${Math.round(location.accuracy)}m
    `
  );
}

async function startScanner() {
  if (isProcessing) return;

  resultBox.className = "result-box";
  resultBox.innerHTML = "";

  moduleStatus.textContent = "Scanner Active";
  scanText.textContent = "Point the camera at the patrol checkpoint QR.";
  scanBtn.textContent = "Scanner Running";
  scanBtn.disabled = true;

  qrReaderElement.style.display = "block";

  html5QrCode = new Html5Qrcode("qr-reader");

  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 240, height: 240 },
      },
      async (decodedText) => {
        if (isProcessing) return;

        isProcessing = true;

        try {
          const token = extractToken(decodedText);

          await stopScanner();

          moduleStatus.textContent = "QR Read";
          scanText.textContent = "QR scanned. Recording patrol with GPS evidence.";

          await recordPatrol(token);
        } catch (err) {
          console.error(err);

          await stopScanner();

          moduleStatus.textContent = "Failed";
          gpsStatus.textContent = "Failed";
          scanBtn.disabled = false;
          scanBtn.textContent = "Try Again";
          isProcessing = false;

          showResult(
            "error",
            `
            <strong>Patrol scan failed</strong><br>
            ${err.message || "Unknown error"}
            `
          );
        }
      },
      () => {}
    );
  } catch (err) {
    console.error(err);

    moduleStatus.textContent = "Camera Failed";
    scanBtn.disabled = false;
    scanBtn.textContent = "Try Again";
    qrReaderElement.style.display = "none";

    showResult(
      "error",
      `
      <strong>Camera could not start</strong><br>
      ${err.message || "Camera permission denied or unavailable."}
      `
    );
  }
}

scanBtn.addEventListener("click", startScanner);
</script>

</body>
</html>
